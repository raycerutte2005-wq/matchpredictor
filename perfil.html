<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstWin - Mi Perfil</title>
    <link rel="stylesheet" href="./CSS/Predicciones.css">
    <link rel ="icon" type ="image/png" href="Imagenes/Logo Principal.png">
</head>
<body>

    <nav>
        <div class="logo">MXP</div>
        <ul class="nav-links">
            <li><a href="partidos.html">Partidos</a></li>
            <li><a href="tabla.html">Tabla</a></li>
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="#" onclick="cerrarSesion()">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <div class="container" style="grid-template-columns: 1fr; max-width: 600px;">
        <section class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar"></div>
                <div>
                    <h2 id="nombre-perfil">Cargando...</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Predictor Manager</p>
                </div>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <span>Nombre de Usuario</span>
                    <strong id="usuario-display">—</strong>
                </div>
                <div class="detail-item">
                    <span>Puntos Totales</span>
                    <strong id="puntos-display" class="points">—</strong>
                </div>
                <div class="detail-item">
                    <span>Posición en Tabla</span>
                    <strong id="posicion-display" class="rank">—</strong>
                </div>
            </div>
        </section>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO5fHYaIbyhyill2SlnbrRmQAFSzFiEQg",
            authDomain: "match-a7d84.firebaseapp.com",
            projectId: "match-a7d84",
            storageBucket: "match-a7d84.firebasestorage.app",
            messagingSenderId: "35409465228",
            appId: "1:35409465228:web:292a993b35d3d35371d0a9",
            measurementId: "G-QF49XZ0QNG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const usuarioActivo = localStorage.getItem('fw_usuario_activo');
        if (!usuarioActivo) window.location.href = 'index.html';

        // Mostrar nombre
        document.getElementById('nombre-perfil').textContent = usuarioActivo;
        document.getElementById('usuario-display').textContent = usuarioActivo;

        // Leer puntos y posición en tiempo real desde Firebase
        const tablaRef = ref(db, 'tabla');
        onValue(tablaRef, (snapshot) => {
            const data = snapshot.val();
            const tabla = data ? Object.values(data).sort((a, b) => b.puntos - a.puntos) : [];

            const miData = tabla.find(u => u.usuario === usuarioActivo);
            const miPosicion = tabla.findIndex(u => u.usuario === usuarioActivo) + 1;

            document.getElementById('puntos-display').textContent = miData ? miData.puntos + ' pts' : '0 pts';
            document.getElementById('posicion-display').textContent = miPosicion > 0 ? '#' + miPosicion : '—';
        });

        window.cerrarSesion = function() {
            localStorage.removeItem('fw_usuario_activo');
            window.location.href = 'index.html';
        };
    </script>

</body>
</html>
