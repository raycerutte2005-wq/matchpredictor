<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstWin - Iniciar Sesión</title>
    <link rel="stylesheet" href="./CSS/Predicciones.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="logo" style="text-align: center; margin-bottom: 2rem;">MXP</div>
        
        <div id="loginForm" class="profile-card">
            <h2 style="margin-bottom: 1.5rem; border: none; padding: 0; text-align: center;">Acceso de Usuario</h2>
            
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <p id="error-msg" style="color: #ef4444; font-size: 0.8rem; margin-bottom: 1rem; display: none;">
                Usuario o contraseña incorrectos.
            </p>

            <button onclick="iniciarSesion()" class="predict-btn" style="width: 100%; padding: 1rem;">Iniciar Sesión</button>
        </div>
    </div>

    <script>
        // Base de usuarios (puedes agregar más aquí)
        const USUARIOS = [
            { usuario: "rayc", password: "match17" },
            { usuario: "eduah", password: "mateo24" },
            { usuario: "victif", password: "victi00" },
        ];

        function iniciarSesion() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const encontrado = USUARIOS.find(u => u.usuario === user && u.password === pass);

            if (encontrado) {
                // Guardar sesión en localStorage
                localStorage.setItem('fw_usuario_activo', user);

                // Registrar en tabla si es nuevo usuario (0 pts)
                let tabla = JSON.parse(localStorage.getItem('fw_tabla') || '[]');
                const yaExiste = tabla.find(u => u.usuario === user);
                if (!yaExiste) {
                    tabla.push({ usuario: user, puntos: 0 });
                    localStorage.setItem('fw_tabla', JSON.stringify(tabla));
                }

                window.location.href = "partidos.html";
            } else {
                errorMsg.style.display = "block";
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
    </script>

</body>
</html>
