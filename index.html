<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstWin - Iniciar Sesión</title>
    <link rel="stylesheet" href="./CSS/Predicciones.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="logo" style="text-align: center; margin-bottom: 2rem;">MXP</div>
        
        <div id="loginForm" class="profile-card">
            <h2 style="margin-bottom: 1.5rem; border: none; padding: 0; text-align: center;">Acceso de Usuario</h2>
            
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <p id="error-msg" style="color: #ef4444; font-size: 0.8rem; margin-bottom: 1rem; display: none;">
                Usuario o contraseña incorrectos.
            </p>

            <button onclick="iniciarSesion()" id="btn-login" class="predict-btn" style="width: 100%; padding: 1rem;">Iniciar Sesión</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO5fHYaIbyhyill2SlnbrRmQAFSzFiEQg",
            authDomain: "match-a7d84.firebaseapp.com",
            projectId: "match-a7d84",
            storageBucket: "match-a7d84.firebasestorage.app",
            messagingSenderId: "35409465228",
            appId: "1:35409465228:web:292a993b35d3d35371d0a9",
            measurementId: "G-QF49XZ0QNG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Usuarios registrados (agregar más aqui si necesitas)
        const USUARIOS = [
            { usuario: "rayc",   password: "match17" },
            { usuario: "eduah",  password: "mateo24" },
            { usuario: "victif", password: "victi00" },
            { usuario: "yamiljl", password: "aguacate" },
            { usuario: "gustam", password: "gustavo" },
            { usuario: "roydanm", password: "ale2503" },
            { usuario: "davids", password: "david05" },
            { usuario: "laidelc", password: "dani98" }
        ];

        window.iniciarSesion = async function() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');

            errorMsg.style.display = 'none';
            const encontrado = USUARIOS.find(u => u.usuario === user && u.password === pass);

            if (!encontrado) {
                errorMsg.textContent = 'Usuario o contraseña incorrectos.';
                errorMsg.style.display = 'block';
                return;
            }

            btn.textContent = 'Entrando...';
            btn.disabled = true;

            try {
                // Registrar usuario en Firebase si es la primera vez
                const jugadorRef = ref(db, 'tabla/' + user);
                const snapshot = await get(jugadorRef);
                if (!snapshot.exists()) {
                    await set(jugadorRef, { usuario: user, puntos: 0 });
                }

                // Solo guardamos el nombre de sesion localmente
                localStorage.setItem('fw_usuario_activo', user);
                window.location.href = 'partidos.html';

            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Error de conexión. Revisa que configuraste Firebase.';
                errorMsg.style.display = 'block';
                btn.textContent = 'Iniciar Sesión';
                btn.disabled = false;
            }
        };

        document.addEventListener('keydown', e => { if (e.key === 'Enter') window.iniciarSesion(); });
    </script>

</body>
</html>
