<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstWin - Partidos</title>
    <link rel="stylesheet" href="./CSS/Predicciones.css">
</head>
<body>

    <nav>
        <div class="logo">MXP</div>
        <ul class="nav-links">
            <li><a href="partidos.html">Partidos</a></li>
            <li><a href="tabla.html">Tabla</a></li>
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="#" onclick="cerrarSesion()">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <div class="container">
        <section id="matches">
            <h2>Próximos Partidos</h2>
            <h3>Acierto Marcador 3pts</h3>
            <h3>Acierto Ganador/Empate 1pts</h3>
            <h3>Desacierto -1pts</h3>
            <div class="matches-grid">


                <div class="match-card" id="card-2">
                    <div class="team">
                        <div class="team-logo" style="background-image:url(Imagenes/images\ 3.jpg); background-color :#ef4444;"></div>
                        <span>Bayern</span>
                    </div>
                    <div class="match-info">
                        <div class="vs">VS</div>
                        <div class="match-time">Mier, 3:00</div>
                        <button class="predict-btn" onclick="abrirModal('Bayern Munich', 'PSG', 'card-3')">Predecir</button>
                    </div>
                    <div class="team">
                        <div class="team-logo" style="background-image:url(Imagenes/images\ 8.jpg); background-color:#292c6a;"></div>
                        <span>PSG</span>
                    </div>
                </div>
                <div class="match-card" id="card-3">
                    <div class="team">
                        <div class="team-logo" style="background-image:url(Imagenes/images\ 7.jpg); background-color :#ef4444;"></div>
                        <span>Liverpool</span>
                    </div>
                    <div class="match-info">
                        <div class="vs">VS</div>
                        <div class="match-time">Sabr, 7:30</div>
                        <button class="predict-btn" onclick="abrirModal('Liverpool', 'Chelsea', 'card-3')">Predecir</button>
                    </div>
                    <div class="team">
                        <div class="team-logo" style="background-image:url(Imagenes/images\ 6.jpg); background-color:#292c6a;"></div>
                        <span>Chelsea</span>
                    </div>
                </div>
                <div class="match-card" id="card-4">
                    <div class="team">
                        <div class="team-logo" style="background-image: url(Imagenes/images.jpg)"></div>
                        <span>Barcelona</span>
                    </div>
                    <div class="match-info">
                        <div class="vs">VS</div>
                        <div class="match-time">Dom, 3:00</div>
                        <button class="predict-btn" onclick="abrirModal('FC Barcelona', 'Real Madrid', 'card-1')">Predecir</button>
                    </div>
                    <div class="team">
                        <div class="team-logo" style="background-image: url(Imagenes/images\ 2.jpg)"></div>
                        <span>Real Madrid</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal de predicción -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#1e293b; border-radius:16px; padding:2rem; width:90%; max-width:400px; border:1px solid #334155;">
            <h3 id="modal-titulo" style="margin-bottom:1.5rem; text-align:center; color:#f8fafc;"></h3>
            <p style="color:#94a3b8; text-align:center; margin-bottom:1rem; font-size:0.9rem;">Ingresa tu predicción de marcador</p>
            <div style="display:flex; align-items:center; gap:1rem; justify-content:center; margin-bottom:1.5rem;">
                <div style="text-align:center;">
                    <div id="nombre-local" style="color:#f8fafc; font-size:0.85rem; margin-bottom:0.5rem;"></div>
                    <input type="number" id="goles-local" min="0" max="20" value="0"
                        style="width:70px; padding:0.8rem; font-size:1.5rem; text-align:center; background:#0f172a; color:#f8fafc; border:2px solid #334155; border-radius:8px;">
                </div>
                <div style="color:#22c55e; font-size:1.5rem; font-weight:bold;">-</div>
                <div style="text-align:center;">
                    <div id="nombre-visitante" style="color:#f8fafc; font-size:0.85rem; margin-bottom:0.5rem;"></div>
                    <input type="number" id="goles-visitante" min="0" max="20" value="0"
                        style="width:70px; padding:0.8rem; font-size:1.5rem; text-align:center; background:#0f172a; color:#f8fafc; border:2px solid #334155; border-radius:8px;">
                </div>
            </div>
            <div style="display:flex; gap:1rem;">
                <button onclick="cerrarModal()" style="flex:1; padding:0.8rem; background:#334155; color:#f8fafc; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Cancelar</button>
                <button onclick="confirmarPrediccion()" class="predict-btn" style="flex:1; padding:0.8rem;">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Toast de confirmación -->
    <div id="toast" style="display:none; position:fixed; bottom:2rem; right:2rem; background:#22c55e; color:#0f172a; padding:1rem 1.5rem; border-radius:10px; font-weight:bold; z-index:2000;">
        ✔ Predicción enviada
    </div>

    <script>
        // Verificar sesión
        const usuarioActivo = localStorage.getItem('fw_usuario_activo');
        if (!usuarioActivo) window.location.href = 'index.html';

        let cardActual = null;
        let localActual = '';
        let visitanteActual = '';

        function abrirModal(local, visitante, cardId) {
            cardActual = cardId;
            localActual = local;
            visitanteActual = visitante;
            document.getElementById('modal-titulo').textContent = local + ' vs ' + visitante;
            document.getElementById('nombre-local').textContent = local;
            document.getElementById('nombre-visitante').textContent = visitante;
            document.getElementById('goles-local').value = 0;
            document.getElementById('goles-visitante').value = 0;
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function confirmarPrediccion() {
            const golesLocal = document.getElementById('goles-local').value;
            const golesVisitante = document.getElementById('goles-visitante').value;
            const mensaje = `🏆 *FirstWin - Predicción de ${usuarioActivo}*\n⚽ ${localActual} ${golesLocal} - ${golesVisitante} ${visitanteActual}`;

            // Enviar WhatsApp
            const numero = '52676182';
            const url = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(mensaje);
            window.open(url, '_blank');

            

            cerrarModal();
            mostrarToast();
        }

        function mostrarToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function cerrarSesion() {
            localStorage.removeItem('fw_usuario_activo');
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
